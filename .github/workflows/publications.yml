name: Publications Pipeline

on:
  # Run monthly on the 1st at 8am UTC
  schedule:
    - cron: '0 8 1 * *'

  # Manual trigger from GitHub Actions UI or via `gh workflow run publications.yml`
  workflow_dispatch:

jobs:
  discover-classify-propose:
    # Scrape OpenAlex, classify, merge, regenerate exports, open PR.
    # GitHub Pages handles site deploy automatically on merge — no separate
    # deploy step in this workflow.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml anthropic

      - name: Scrape OpenAlex for new papers
        run: python3 scripts/scraper.py

      - name: Auto-classify new papers
        if: hashFiles('new_papers_staging.yaml') != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/classify.py

      - name: Merge classified papers into _data/publications.yaml
        if: hashFiles('classified_papers.yaml') != ''
        run: python3 scripts/merge.py --auto

      - name: Regenerate RIS/BibTeX exports
        if: hashFiles('_data/publications.yaml') != ''
        run: python3 scripts/build_pubs.py

      - name: Open PR with updated publications data + exports
        if: hashFiles('_data/publications.yaml') != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: new-publications
          delete-branch: true
          add-paths: |
            _data/publications.yaml
            publications/publications.ris
            publications/publications.bib
          commit-message: "chore: add newly discovered publications (auto-tagged, unreviewed)"
          title: "📚 New publications — tags need review"
          body: |
            The publications pipeline found new papers on OpenAlex and auto-tagged them.

            **Action required:** Review `_data/publications.yaml`. For each new entry:
              - Verify the auto-proposed tags match the paper's content
              - Tombstone misattributed entries by setting `exclude: true` and clearing tags (see AGENT.md)
              - Adjust tags inline in this PR if needed

            The RIS and BibTeX exports in `publications/` have been regenerated to match.

            Merging this PR will trigger the site rebuild via GitHub Pages.
          labels: publications, needs-review
