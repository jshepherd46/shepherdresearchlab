name: Publications Pipeline

on:
  # Run weekly on Mondays at 8am UTC
  schedule:
    - cron: '0 8 * * 1'

  # Manual trigger from GitHub Actions UI or via `gh workflow run publications.yml`
  workflow_dispatch:

  # Rebuild site on every push that changes publications.yaml / tags.yaml / builder
  push:
    branches: [main]
    paths:
      - 'publications.yaml'
      - 'tags.yaml'
      - 'scripts/build_pubs.py'

jobs:
  discover-classify-propose:
    # Only run discovery on scheduled/manual runs, not on push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml anthropic

      - name: Scrape OpenAlex for new papers
        run: python3 scripts/scraper.py

      - name: Auto-classify new papers
        if: hashFiles('new_papers_staging.yaml') != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/classify.py

      - name: Merge classified papers into publications.yaml
        if: hashFiles('classified_papers.yaml') != ''
        run: python3 scripts/merge.py --auto

      - name: Open PR with publications.yaml diff for review
        if: hashFiles('publications.yaml') != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: new-publications
          delete-branch: true
          add-paths: publications.yaml
          commit-message: "chore: add newly discovered publications (auto-tagged, unreviewed)"
          title: "📚 New publications — tags need review"
          body: |
            The publications pipeline found new papers on OpenAlex and auto-tagged them.

            **Action required:** Review `publications.yaml`. For each new entry:
              - Verify the tags match the paper's content (tags are auto-proposed, not human-reviewed)
              - Remove any mis-attributed papers (OpenAlex author disambiguation is imperfect)
              - Adjust tags directly in this PR if needed

            Merging this PR will trigger a site rebuild with the new papers.
          labels: publications, needs-review

  build-site:
    # Rebuild site when publications.yaml / tags.yaml / build_pubs.py change on main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build publication pages and exports
        run: python3 scripts/build_pubs.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
