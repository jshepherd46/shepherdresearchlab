- name: "Makawalu Study"
  short_name: "Makawalu"
  status: reopening
  note: "Closed for now; expected to reopen — get in touch to be notified."
  eligibility: "Women 18+ with a mammogram scheduled within 6 months. Not currently pregnant or breastfeeding. No breast augmentation or implants."
  commitment: "One-time, 1-hour Saturday visit at the UH Cancer Center"
  compensation: "Gift card"
  description: "A pilot study evaluating a handheld portable ultrasound device (Clarius HD3 L15) integrated with AI for breast-cancer detection — comparing its performance to traditional mammography. The research aims to enhance screening accessibility in remote and underserved Pacific communities. \"Makawalu\" means \"eight eyes\" in Hawaiian — symbolizing examination from multiple perspectives."
  email: makawalustudy@cc.hawaii.edu
  detail_page: /makawalu-study-breast-cancer-screening/

- name: "Shape Up! Keiki"
  short_name: "Shape Up! Keiki"
  status: closed
  eligibility: "Toddlers and infants, ages 0–5 years."
  commitment: "—"
  compensation: "—"
  description: "Helped families learn about their children's health while researchers developed technologies to measure body shape and understand its relationship to physical strength and cardiovascular health."
  email: bodycompstudies@cc.hawaii.edu
  detail_page: /shapeup/for-keiki/
