# Studies displayed on /join-a-study/.
#
# The page renders cards from this list, sorted by status:
#   enrolling → reopening → closed
#
# Fields:
#   name          (required) — full study title
#   short_name    (required) — used in form dropdowns
#   status        (required) — enrolling | reopening | closed
#   eligibility   — one-line eligibility summary
#   commitment    — visit duration / frequency
#   compensation  — gift card, scan report, etc.
#   description   — short paragraph
#   email         — study contact email (defaults to bodycompstudies@cc.hawaii.edu
#                   for studies that don't yet have a dedicated address)
#   phone         — usually shared lab phone (808-440-5234); only set if different
#   detail_page   — URL to a deeper study page if one exists
#   note          — extra annotation displayed near the status badge
#                   (e.g. "Closed; expected to reopen 2026")

- name: "Samsung Study (2026)"
  short_name: "Samsung Study"
  status: enrolling
  eligibility: "Healthy adults; no removable metal, jewelry, or incompatible medical devices, and no chronic disease. Recruitment uses age and BMI categories — see the BMI calculator to estimate yours."
  commitment: "Single 4-hour appointment"
  compensation: "Compensation + complimentary DXA scan report"
  description: "Evaluates whether extracellular water and total body water measured by Samsung Bioimpedance Analysis (BIA) devices are accurate compared to standard tests including the dilution method and dual-energy X-ray absorptiometry (DXA). Includes BIA, DXA, 3D optical scan, Bod Pod, biological samples (urine, saliva, blood), and a diet questionnaire."
  email: bodycompstudies@cc.hawaii.edu

- name: "Tanita Study"
  short_name: "Tanita Study"
  status: enrolling
  eligibility: "Healthy adults; no non-removable metal, jewelry, or medical devices, and no chronic disease."
  commitment: "One ~4-hour visit, Mondays–Fridays at 7:30 AM check-in"
  compensation: "Compensation + complimentary DXA scan report"
  description: "Evaluates the accuracy of TANITA Bioimpedance Analysis (BIA) devices for measuring extracellular and total body water — compared against standard methods like dilution analysis and dual-energy X-ray absorptiometry (DXA). Includes BIA, DXA, urine/saliva/blood samples, 3D optical scan, Bod Pod, and a diet questionnaire."
  email: bodycompstudies@cc.hawaii.edu

