# AI PHI Affinity Group monthly meetings.
# Drives /aiphi/events/ — the page splits this list into Upcoming (date >= today)
# and Past (date < today) at build time using site.time. Past meetings with a
# `stein_photo` field also populate the speaker-compensation collage below the
# past-meetings grid.
#
# Schema (per meeting):
#   date           required  YYYY-MM-DD (string). Page sorts and groups by this.
#   speaker        required  Speaker name (or "A and B" for joint talks).
#   affiliation    optional  Institution / role.
#   title          required  Talk title.
#   abstract       optional  1-2 sentence summary, shown for the upcoming card.
#   image          optional  Path under wp-content/uploads/... — shown on the
#                            upcoming card. Past cards are compact and don't
#                            show this field.
#   stein_photo    optional  Photo of the speaker with their AI PHI beer stein,
#                            sent back by the speaker after the talk. When set,
#                            the entry appears in the speaker-compensation
#                            collage. Path under wp-content/uploads/...
#   recording_url  optional  YouTube video URL for that specific talk.
#   recap_post     optional  /news/<slug>/ for a written recap.
#
# To schedule a new meeting: add an entry at the TOP of the file with a future
# date. To attach a stein photo as they come in: drop the image into
# wp-content/uploads/YYYY/MM/ and add the `stein_photo:` line to that meeting.
#
# KNOWN GAP: Oliver Diaz spoke in the affinity group (we have his stein photo at
# wp-content/uploads/2024/06/OliverDiaz.png) but the talk date isn't recorded
# here yet — please add a meeting entry with the correct date and title.

